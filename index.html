<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Vedanth & Vedhansh Memories</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-heart"></i>
                    <h1>Vedanth & Vedhansh</h1>
                </div>
                <p class="subtitle">Precious Memories Forever ✨</p>
            </div>
        </header>

        <div class="upload-section">
            <div class="upload-card">
                <i class="fas fa-camera upload-icon"></i>
                <input type="file" id="imageInput" accept="image/*" multiple>
                <label for="imageInput" class="upload-label">
                    <i class="fas fa-plus"></i>
                    Add New Memory
                </label>
                <input type="text" id="memoryTitle" placeholder="Memory title (e.g., First Steps)" maxlength="50">
                <input type="date" id="memoryDate">
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <i class="fas fa-images"></i>
                <span id="totalMemories">0</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-calendar"></i>
                <span id="totalYears">2024</span>
            </div>
        </div>

        <div class="gallery" id="gallery">
            <div class="empty-state" id="emptyState">
                <i class="fas fa-heart-broken"></i>
                <h3>No memories yet</h3>
                <p>Add your first precious moment above!</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button class="close-modal" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <img id="modalImage" src="" alt="">
                <div class="modal-info">
                    <div class="info-item">
                        <i class="fas fa-calendar-day"></i>
                        <span id="modalDate"></span>
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="edit-btn" id="editBtn">
                    <i class="fas fa-edit"></i> Edit
                </button>
                <button class="delete-btn" id="deleteBtn">
                    <i class="fas fa-trash"></i> Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="edit-modal" id="editModal">
        <div class="edit-modal-content">
            <h3><i class="fas fa-edit"></i> Edit Memory</h3>
            <input type="text" id="editTitle" placeholder="Memory title">
            <input type="date" id="editDate">
            <div class="edit-actions">
                <button id="saveEdit">Save Changes</button>
                <button id="cancelEdit">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
